name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install JS dependencies
        working-directory: app/public/wp-content/plugins/SwiftLetter
        run: npm ci

      - name: Build JS assets
        working-directory: app/public/wp-content/plugins/SwiftLetter
        run: npm run build

      - name: Install PHP dependencies (production only)
        working-directory: app/public/wp-content/plugins/SwiftLetter
        run: |
          rm -rf vendor
          composer update --no-dev --optimize-autoloader --prefer-dist

      - name: Verify vendor completeness
        working-directory: app/public/wp-content/plugins/SwiftLetter
        run: |
          test -d vendor/openai-php/client/src                    || (echo "MISSING: openai-php/client/src" && exit 1)
          test -d vendor/phpoffice/phpword/src                    || (echo "MISSING: phpoffice/phpword/src" && exit 1)
          test -d vendor/yahnis-elsts/plugin-update-checker       || (echo "MISSING: plugin-update-checker" && exit 1)
          test -f vendor/autoload.php                             || (echo "MISSING: autoload" && exit 1)
          php -r "require 'vendor/autoload.php';" 2>&1           || (echo "FATAL: autoloader failed" && exit 1)
          echo "Vendor verified OK"

      - name: Package plugin zip
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PLUGIN_DIR="app/public/wp-content/plugins/SwiftLetter"
          STAGING="staging/SwiftLetter"
          mkdir -p "$STAGING"
          rsync -a \
            --exclude='.git' \
            --exclude='.claude' \
            --exclude='.gitignore' \
            --exclude='node_modules' \
            --exclude='/src' \
            --exclude='/tests' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='CLAUDE.md' \
            "$PLUGIN_DIR/" "$STAGING/"
          cd staging
          zip -r "../swiftletter-${VERSION}.zip" SwiftLetter/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "SwiftLetter v${{ steps.version.outputs.version }}"
          files: "swiftletter-${{ steps.version.outputs.version }}.zip"
          generate_release_notes: true
